<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CodeLab">
<meta name="theme-color" content="#0d0f14">
<title>CodeLab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg:      #0d0f14;
  --surface: #151821;
  --panel:   #1c2030;
  --border:  #252a3d;
  --accent:  #7c6af7;
  --green:   #3ecf8e;
  --amber:   #f59e0b;
  --red:     #ef4444;
  --text:    #e2e6f3;
  --muted:   #6b7699;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Inter', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; height: 100dvh; }
body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ── APP SHELL ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* TOP BAR */
#topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  height: 50px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#logo {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 1.1rem;
  color: var(--accent);
}
#logo em { color: var(--green); font-style: normal; }
.spacer { flex: 1; }
#py-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .7rem;
  font-family: var(--mono);
  color: var(--muted);
  background: var(--panel);
  border-radius: 20px;
  padding: 5px 11px;
  border: 1px solid var(--border);
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--amber);
  flex-shrink: 0;
}
.dot.on  { background: var(--green); }
.dot.err { background: var(--red); }

/* TABS */
#tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  font-size: .78rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .18s, border-color .18s;
  letter-spacing: .2px;
}
.tab.active { color: var(--text); }
.tab.py.active  { border-color: var(--accent); }
.tab.html.active { border-color: var(--green); }
.tab svg { width: 14px; height: 14px; flex-shrink: 0; }

/* WORKSPACE */
#workspace {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* PANES */
.pane { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.pane.active { display: flex; }

/* EDITOR */
.editor-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}
.line-nums {
  width: 42px;
  padding: 14px 6px 14px 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  font-family: var(--mono);
  font-size: .8rem;
  line-height: 1.7;
  color: var(--muted);
  text-align: right;
  overflow: hidden;
  pointer-events: none;
  user-select: none;
  flex-shrink: 0;
}
textarea.code {
  flex: 1;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: .8rem;
  line-height: 1.7;
  padding: 14px 14px 14px 12px;
  border: none;
  outline: none;
  resize: none;
  tab-size: 4;
  white-space: pre;
  overflow-x: auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  caret-color: var(--accent);
  user-select: text;
  -webkit-user-select: text;
}

/* ACTION BAR */
.action-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 16px;
  border-radius: 9px;
  border: none;
  font-family: var(--sans);
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform .1s, opacity .15s;
  flex-shrink: 0;
}
.btn:active { transform: scale(.95); opacity: .8; }
.btn svg { width: 13px; height: 13px; }
.btn-run  { background: var(--accent); color: #fff; }
.btn-green { background: var(--green); color: #000; }
.btn-ghost {
  background: var(--panel);
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost.on { background: var(--green); color: #000; border-color: var(--green); }
.fname {
  margin-left: auto;
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--muted);
}

/* CONSOLE */
#console {
  display: flex;
  flex-direction: column;
  border-top: 2px solid var(--accent);
  background: var(--bg);
  height: 42%;
  min-height: 90px;
  flex-shrink: 0;
}
#console-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: .7rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: .8px;
  text-transform: uppercase;
  flex-shrink: 0;
}
#console-head button {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: .75rem; padding: 2px 6px;
  border-radius: 4px; margin-left: auto;
  font-family: var(--sans);
}
#console-out {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: .78rem;
  line-height: 1.7;
  -webkit-overflow-scrolling: touch;
}
.cline { white-space: pre-wrap; word-break: break-all; }
.cline.out  { color: var(--text); }
.cline.err  { color: var(--red); }
.cline.info { color: var(--muted); }
.cline.ok   { color: var(--green); }
.cline.warn { color: var(--amber); }

#console-in-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#console-in-row span {
  color: var(--accent);
  font-family: var(--mono);
  font-size: .9rem;
}
#console-in {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: var(--mono);
  font-size: .78rem;
  color: var(--text);
  caret-color: var(--accent);
  user-select: text;
  -webkit-user-select: text;
}

/* HTML SPLIT */
#html-split {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#html-top { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: 100px; }
#preview-box {
  display: flex;
  flex-direction: column;
  border-top: 2px solid var(--green);
  flex: 1;
  overflow: hidden;
  min-height: 100px;
}
#preview-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  background: var(--surface);
  font-size: .68rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .4px;
  flex-shrink: 0;
}
#live-pill {
  background: var(--green);
  color: #000;
  border-radius: 4px;
  padding: 1px 7px;
  font-size: .62rem;
  font-weight: 700;
  letter-spacing: .6px;
  display: none;
}
#live-pill.show { display: inline; }
#drag-bar {
  height: 6px;
  background: var(--border);
  cursor: row-resize;
  flex-shrink: 0;
  touch-action: none;
}
#preview-frame {
  flex: 1;
  border: none;
  background: #fff;
  width: 100%;
}

/* LOADER */
#loader {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
}
#loader.gone { display: none; }
.load-logo { font-family: var(--mono); font-size: 2.2rem; font-weight: 600; color: var(--accent); }
.load-logo em { color: var(--green); font-style: normal; }
.prog-track { width: 180px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill  { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width .3s ease; }
.load-msg { font-size: .72rem; font-family: var(--mono); color: var(--muted); }

/* iOS install tip banner */
#ios-banner {
  position: fixed;
  bottom: env(safe-area-inset-bottom, 0);
  left: 0; right: 0;
  z-index: 100;
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: .78rem;
  color: var(--text);
}
#ios-banner.hidden { display: none; }
#ios-banner button {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 1.1rem; margin-left: auto;
}

/* scrollbar */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<script src="https://cdn.jsdelivr.net/pyodide/v0.27.3/full/pyodide.js"></script>
<script>
'use strict';

// ── GLOBALS ──
let py = null;
let live = false;
let liveTimer = null;
let history = [];
let histIdx = -1;

// ── LOADER ──
const prog = document.getElementById('prog');
const loadMsg = document.getElementById('load-msg');
function setProgress(p, msg) {
  prog.style.width = p + '%';
  if (msg) loadMsg.textContent = msg;
}

async function initPy() {
  try {
    setProgress(10, 'Téléchargement Pyodide…');
    py = await loadPyodide({
      indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.27.3/full/',
      stdout: t => clog(t, 'out'),
      stderr: t => clog(t, 'err'),
    });
    setProgress(90, 'Initialisation…');
    setProgress(100, 'Prêt !');
    setTimeout(() => document.getElementById('loader').classList.add('gone'), 350);
    setDot('on', 'Python prêt');
    clog('✓ Python 3 prêt — Pyodide ' + py.version, 'ok');
    clog('Écris du code et appuie sur Exécuter.', 'info');
  } catch(e) {
    setDot('err', 'Erreur');
    setProgress(100, 'Erreur de chargement');
    setTimeout(() => document.getElementById('loader').classList.add('gone'), 600);
    clog('Erreur : ' + e.message, 'err');
  }
}

function setDot(state, label) {
  const d = document.getElementById('dot');
  d.className = 'dot' + (state ? ' ' + state : '');
  document.getElementById('py-lbl').textContent = label;
}

// ── TABS ──
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab.' + id).classList.add('active');
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + id).classList.add('active');
}

// ── LINE NUMBERS ──
function updateNums(taId, numsId) {
  const ta = document.getElementById(taId);
  const nm = document.getElementById(numsId);
  const n = ta.value.split('\n').length;
  nm.textContent = Array.from({length: n}, (_, i) => i + 1).join('\n');
  nm.scrollTop = ta.scrollTop;
}

function setupEditor(taId, numsId, onInput) {
  const ta = document.getElementById(taId);
  ta.addEventListener('input', () => { updateNums(taId, numsId); if(onInput) onInput(); });
  ta.addEventListener('scroll', () => { document.getElementById(numsId).scrollTop = ta.scrollTop; });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ta.selectionStart;
      ta.value = ta.value.slice(0, s) + '    ' + ta.value.slice(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = s + 4;
      updateNums(taId, numsId);
    }
  });
}

setupEditor('py-code', 'py-nums');
setupEditor('html-code', 'html-nums', () => { if(live) scheduleLive(); });

// ── PYTHON ──
async function runPython() {
  if (!py) { clog('Python pas encore prêt…', 'warn'); return; }
  const code = document.getElementById('py-code').value.trim();
  if (!code) return;
  setDot('', 'Exécution…');
  clog('── Exécution ──', 'info');
  try {
    await py.runPythonAsync(code);
    clog('── Terminé ──', 'ok');
  } catch(e) {
    clog(e.message, 'err');
  }
  setDot('on', 'Python prêt');
  scrollConsole();
}

// ── CONSOLE ──
function clog(text, type) {
  const out = document.getElementById('console-out');
  const d = document.createElement('div');
  d.className = 'cline ' + (type || 'out');
  d.textContent = text;
  out.appendChild(d);
  scrollConsole();
}

function scrollConsole() {
  const o = document.getElementById('console-out');
  o.scrollTop = o.scrollHeight;
}

function clearConsole() {
  document.getElementById('console-out').innerHTML = '';
}

async function consoleKey(e) {
  const inp = document.getElementById('console-in');
  if (e.key === 'Enter') {
    const code = inp.value.trim();
    if (!code) return;
    history.unshift(code);
    histIdx = -1;
    clog('› ' + code, 'info');
    inp.value = '';
    if (!py) { clog('Python pas encore prêt…', 'warn'); return; }
    try {
      const r = await py.runPythonAsync(code);
      if (r !== undefined && r !== null) clog(String(r), 'out');
    } catch(e) {
      clog(e.message, 'err');
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    histIdx = Math.min(histIdx + 1, history.length - 1);
    if (history[histIdx] !== undefined) inp.value = history[histIdx];
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    histIdx = Math.max(histIdx - 1, -1);
    inp.value = histIdx >= 0 ? history[histIdx] : '';
  }
}

// ── HTML PREVIEW ──
function refreshPreview() {
  const code = document.getElementById('html-code').value;
  const f = document.getElementById('preview');
  f.srcdoc = code;
}

function toggleLive() {
  live = !live;
  const btn = document.getElementById('live-btn');
  const pill = document.getElementById('live-pill');
  btn.classList.toggle('on', live);
  pill.classList.toggle('show', live);
  if (live) { btn.innerHTML = btn.innerHTML.replace('Live','Live ✓'); refreshPreview(); }
  else btn.innerHTML = btn.innerHTML.replace('Live ✓','Live');
}

function scheduleLive() {
  clearTimeout(liveTimer);
  liveTimer = setTimeout(refreshPreview, 500);
}

// ── DRAG RESIZE ──
const dragBar = document.getElementById('drag-bar');
const htmlTop = document.getElementById('html-top');
const prevBox = document.getElementById('preview-box');
let drag = false, dragY0, edH0, prH0;

function startDrag(y) {
  drag = true;
  dragY0 = y;
  edH0 = htmlTop.offsetHeight;
  prH0 = prevBox.offsetHeight;
}
function moveDrag(y) {
  if (!drag) return;
  const dy = y - dragY0;
  htmlTop.style.cssText = `flex:none;height:${Math.max(80, edH0+dy)}px`;
  prevBox.style.cssText = `flex:none;height:${Math.max(80, prH0-dy)}px`;
}
dragBar.addEventListener('touchstart', e => startDrag(e.touches[0].clientY), {passive:true});
document.addEventListener('touchmove', e => moveDrag(e.touches[0].clientY), {passive:true});
document.addEventListener('touchend', () => drag = false);
dragBar.addEventListener('mousedown', e => startDrag(e.clientY));
document.addEventListener('mousemove', e => moveDrag(e.clientY));
document.addEventListener('mouseup', () => drag = false);

// ── iOS INSTALL BANNER ──
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if (isIOS && !isStandalone) {
  setTimeout(() => {
    document.getElementById('ios-banner').classList.remove('hidden');
  }, 3000);
}

// ── ANDROID INSTALL ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show Android banner
  const b = document.createElement('div');
  b.style.cssText='position:fixed;bottom:env(safe-area-inset-bottom,0);left:0;right:0;z-index:100;background:#1c2030;border-top:1px solid #252a3d;padding:12px 16px;display:flex;align-items:center;gap:12px;font-size:.78rem;color:#e2e6f3;font-family:Inter,sans-serif;';
  b.innerHTML='<span style="flex:1">📲 Installer CodeLab sur l\'écran d\'accueil ?</span><button onclick="installAndroid()" style="background:#7c6af7;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:600;cursor:pointer;">Installer</button><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#6b7699;cursor:pointer;font-size:1.1rem;">✕</button>';
  b.id='a-banner';
  document.body.appendChild(b);
});

async function installAndroid() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  const b = document.getElementById('a-banner');
  if (b) b.remove();
}

// ── INIT ──
updateNums('py-code','py-nums');
updateNums('html-code','html-nums');
refreshPreview();
initPy();
</script>
